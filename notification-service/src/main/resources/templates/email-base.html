<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif; }
    .wrapper { max-width:600px; margin:30px auto; background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .header { background:#1a73e8; padding:28px 32px; }
    .header h1 { margin:0; color:#ffffff; font-size:22px; font-weight:700; }
    .body { padding:32px; color:#333333; font-size:15px; line-height:1.6; }
    .body p { margin:0 0 16px; }
    .footer { background:#f9f9f9; padding:16px 32px; font-size:12px; color:#888888; text-align:center; border-top:1px solid #eeeeee; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1 th:text="${subject}">Notification</h1>
  </div>
  <div class="body">
    <p th:text="${message}">Message body</p>
  </div>
  <div class="footer">
    <p>You received this email because you have an account with us.<br/>
    &copy; 2026 E-Commerce Platform. All rights reserved.</p>
  </div>
</div>
</body>
</html>
