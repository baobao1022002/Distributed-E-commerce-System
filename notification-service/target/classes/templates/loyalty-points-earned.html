<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif; }
    .wrapper { max-width:600px; margin:30px auto; background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .header { background:#fbbc04; padding:28px 32px; }
    .header h1 { margin:0; color:#333333; font-size:22px; }
    .badge { display:inline-block; background:#fef9e7; color:#b06000; border-radius:20px; padding:6px 18px; font-size:13px; font-weight:600; margin-bottom:18px; }
    .body { padding:32px; color:#333333; font-size:15px; line-height:1.7; }
    .body p { margin:0 0 14px; }
    .points-box { background:#fffbf0; border:2px solid #fbbc04; border-radius:8px; padding:20px 24px; text-align:center; margin:18px 0; }
    .points-box .pts { font-size:36px; font-weight:700; color:#b06000; }
    .points-box .label { font-size:13px; color:#888; margin-top:4px; }
    .footer { background:#f9f9f9; padding:16px 32px; font-size:12px; color:#888888; text-align:center; border-top:1px solid #eeeeee; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>⭐ You Earned Loyalty Points!</h1>
  </div>
  <div class="body">
    <span class="badge">Points Earned</span>
    <p th:text="${message}">You just earned loyalty points.</p>
    <p>Keep shopping to unlock higher tiers and earn even more rewards!</p>
  </div>
  <div class="footer">
    <p>&copy; 2026 E-Commerce Platform. All rights reserved.</p>
  </div>
</div>
</body>
</html>
