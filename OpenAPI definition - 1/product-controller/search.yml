    description: OK
    request:
      url: "{{baseUrl}}/v1/products/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "ids": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "data": [
              {
                "id": "",
                "name": "",
                "price": 0,
                "stock": 0,
                "categoryId": ""
              }
            ],
            "message": ""
          }
