info:
  name: search
  type: http
  seq: 4
  tags:
    - product-controller

http:
  method: POST
  url: http://localhost:8999/products/search
  body:
    type: json
    data: |-
      {
        "ids": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
