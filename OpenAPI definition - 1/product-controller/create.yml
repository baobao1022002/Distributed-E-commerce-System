info:
  name: create
  type: http
  seq: 2
  tags:
    - product-controller

http:
  method: POST
  url: http://localhost:8999/v1/products
  body:
    type: json
    data: |-
      {
        "name": "",
        "price": 0,
        "stock": 0,
        "categoryId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/v1/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "price": 0,
            "stock": 0,
            "categoryId": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "data": {
              "isDeleted": false,
              "createdDate": "",
              "createdBy": "",
              "lastModifiedDate": "",
              "lastModifiedBy": "",
              "id": "",
              "name": "",
              "price": 0,
              "stock": 0,
              "categoryId": ""
            },
            "message": ""
          }
