info:
  name: redeem
  type: http
  seq: 1
  tags:
    - loyalty-controller

http:
  method: POST
  url: http://localhost:8185/api/loyalty/:userId/redeem
  params:
    - name: userId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "points": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/loyalty/:userId/redeem"
      method: POST
      params:
        - name: userId
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "points": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: "{}"
