server:
  port: 8282

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
              - Path=/v1/orders/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/v1/products/**
            - id: promotion-service
              uri: lb://promotion-service
              predicates:
                - Path=/api/promotions/**
            - id: loyalty-service
              uri: lb://loyalty-service
              predicates:
                - Path=/api/loyalty/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/vti-dtn-2506-2
          jwk-set-uri: http://localhost:8080/realms/vti-dtn-2506-2/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
logging:
  level:
    root: info